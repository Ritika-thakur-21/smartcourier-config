server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # Auth Service
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/gateway/auth/**
          filters:
            - RewritePath=/gateway/auth(?<segment>/?.*), /auth${segment}

        # Delivery Service — with sub path
        - id: delivery-service-path
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/gateway/deliveries/**
          filters:
            - RewritePath=/gateway/deliveries(?<segment>/?.*), /deliveries${segment}

        # Delivery Service — root path
        - id: delivery-service-root
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/gateway/deliveries
          filters:
            - RewritePath=/gateway/deliveries, /deliveries

        # Tracking Service — with sub path
        - id: tracking-service-path
          uri: lb://TRACKING-SERVICE
          predicates:
            - Path=/gateway/tracking/**
          filters:
            - RewritePath=/gateway/tracking(?<segment>/?.*), /tracking${segment}

        # Tracking Service — root path
        - id: tracking-service-root
          uri: lb://TRACKING-SERVICE
          predicates:
            - Path=/gateway/tracking
          filters:
            - RewritePath=/gateway/tracking, /tracking

        # Admin Service — with sub path
        - id: admin-service-path
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/gateway/admin/**
          filters:
            - RewritePath=/gateway/admin(?<segment>/?.*), /admin${segment}

        # Admin Service — root path
        - id: admin-service-root
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/gateway/admin
          filters:
            - RewritePath=/gateway/admin, /admin

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}   # ✅ FIX ADDED

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always
