server:
  port: 8080

spring:
  application:
    name: api-gateway

  zipkin:
    base-url: http://localhost:9411

  sleuth:
    enabled: true

  cloud:
    gateway:
      routes:

        # AUTH SERVICE
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/gateway/auth/**
          filters:
            - RewritePath=/gateway/auth(?<segment>/?.*), /auth${segment}

        # DELIVERY SERVICE
        - id: delivery-service
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/gateway/deliveries/**
          filters:
            - RewritePath=/gateway/deliveries(?<segment>/?.*), /deliveries${segment}

        # TRACKING SERVICE
        - id: tracking-service
          uri: lb://TRACKING-SERVICE
          predicates:
            - Path=/gateway/tracking/**
          filters:
            - RewritePath=/gateway/tracking(?<segment>/?.*), /tracking${segment}

        # ADMIN SERVICE
        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/gateway/admin/**
          filters:
            - RewritePath=/gateway/admin(?<segment>/?.*), /admin${segment}

# ✅ EUREKA (FINAL WORKING)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}
    non-secure-port: ${server.port}

# ✅ ACTUATOR (ALL ENDPOINTS)
management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always
    info:
      enabled: true

  tracing:
    sampling:
      probability: 1.0

# ✅ INFO (VISIBLE NOW)
info:
  app:
    name: API Gateway
    description: Smart Courier API Gateway
    version: 1.0
