server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      routes:

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/gateway/auth/**
          filters:
            - RewritePath=/gateway/auth(?<segment>/?.*), ${segment}

        - id: delivery-service
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/gateway/deliveries/**
          filters:
            - RewritePath=/gateway/deliveries(?<segment>/?.*), ${segment}

        - id: tracking-service
          uri: lb://TRACKING-SERVICE
          predicates:
            - Path=/gateway/tracking/**
          filters:
            - RewritePath=/gateway/tracking(?<segment>/?.*), ${segment}

        - id: admin-service
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/gateway/admin/**
          filters:
            - RewritePath=/gateway/admin(?<segment>/?.*), ${segment}

      # ✅ CORS (same block ke andar hona chahiye)
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"


# ✅ SWAGGER CONFIG
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: AUTH-SERVICE
        url: /gateway/auth/v3/api-docs

      - name: DELIVERY-SERVICE
        url: /gateway/deliveries/v3/api-docs

      - name: TRACKING-SERVICE
        url: /gateway/tracking/v3/api-docs

      - name: ADMIN-SERVICE
        url: /gateway/admin/v3/api-docs


# ✅ EUREKA
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
