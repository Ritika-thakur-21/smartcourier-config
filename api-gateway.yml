server:
  port: 8080

spring:
  application:
    name: api-gateway

  zipkin:
    base-url: http://localhost:9411

  sleuth:
    enabled: true

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/gateway/auth/**
          filters:
            - RewritePath=/gateway/auth(?<segment>/?.*), /auth${segment}

        - id: delivery-service-path
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/gateway/deliveries/**
          filters:
            - RewritePath=/gateway/deliveries(?<segment>/?.*), /deliveries${segment}

        - id: delivery-service-root
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/gateway/deliveries
          filters:
            - RewritePath=/gateway/deliveries, /deliveries

        - id: tracking-service-path
          uri: lb://TRACKING-SERVICE
          predicates:
            - Path=/gateway/tracking/**
          filters:
            - RewritePath=/gateway/tracking(?<segment>/?.*), /tracking${segment}

        - id: tracking-service-root
          uri: lb://TRACKING-SERVICE
          predicates:
            - Path=/gateway/tracking
          filters:
            - RewritePath=/gateway/tracking, /tracking

        - id: admin-service-path
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/gateway/admin/**
          filters:
            - RewritePath=/gateway/admin(?<segment>/?.*), /admin${segment}

        - id: admin-service-root
          uri: lb://ADMIN-SERVICE
          predicates:
            - Path=/gateway/admin
          filters:
            - RewritePath=/gateway/admin, /admin

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
    non-secure-port: ${server.port}

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0
