server:
  port: 8082

spring:
  application:
    name: DELIVERY-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/delivery_db
    username: root
    password: Ritika@123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # RABBITMQ CONFIG ADDED
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  zipkin:
    base-url: http://localhost:9411

# EUREKA
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}

# ACTUATOR
management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0

#  FEIGN + CIRCUIT BREAKER
feign:
  circuitbreaker:
    enabled: true

#  CIRCUIT BREAKER CONFIG
resilience4j:
  circuitbreaker:
    instances:
      TRACKING-SERVICE:
        registerHealthIndicator: true
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
